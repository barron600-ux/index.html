<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian CRM v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d0f14;--surface:#161a22;--card:#1c2130;--card2:#222840;
    --border:#2a3050;--border2:#3a4570;
    --text:#e8ecf5;--muted:#7a88aa;--dim:#4a5570;
    --gold:#c9a84c;--gold2:#f0c96e;--teal:#3ecfb3;--teal2:#5de8cc;
    --coral:#e05c4a;--blue:#4a8fff;--purple:#9b6fff;--green:#4ecb8d;
    --amber:#f59e0b;
    --accent-bg:rgba(201,168,76,0.08);
    --rad:10px;--rad-lg:16px;
    font-family:'DM Sans',sans-serif;
  }
  body{background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
  .app{display:flex;height:100vh;overflow:hidden;}

  /* ── Sidebar ── */
  .sidebar{width:224px;min-width:224px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
  .logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:16px;color:#0d0f14;font-weight:bold;}
  .logo-text{font-family:'DM Serif Display',serif;font-size:18px;color:var(--gold2);}
  .logo-sub{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
  nav{flex:1;padding:12px 8px;overflow-y:auto;}
  .nav-section{margin-bottom:18px;}
  .nav-label{font-size:10px;font-weight:600;color:var(--dim);letter-spacing:1.2px;text-transform:uppercase;padding:0 10px;margin-bottom:6px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--muted);transition:all 0.15s;font-size:13px;user-select:none;border:1px solid transparent;}
  .nav-item:hover{background:var(--card);color:var(--text);}
  .nav-item.active{background:var(--accent-bg);color:var(--gold2);border-color:rgba(201,168,76,0.2);}
  .nav-icon{width:16px;height:16px;opacity:0.7;flex-shrink:0;}
  .nav-item.active .nav-icon{opacity:1;}
  .badge{margin-left:auto;background:var(--coral);color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;font-weight:600;min-width:18px;text-align:center;}
  .badge-overdue{background:var(--coral);}
  .sidebar-footer{padding:12px;border-top:1px solid var(--border);}
  .user-row{display:flex;align-items:center;gap:10px;}
  .s-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--blue));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0;}
  .user-name{font-size:13px;font-weight:500;}
  .user-role{font-size:11px;color:var(--muted);}
  .save-indicator{font-size:10px;color:var(--green);margin-top:2px;transition:opacity 0.5s;}

  /* ── Main ── */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;}
  .topbar-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);flex:1;}
  .content{flex:1;overflow-y:auto;padding:24px;}

  /* ── Buttons ── */
  .btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;white-space:nowrap;}
  .btn-primary{background:var(--gold);color:#0d0f14;font-weight:600;}
  .btn-primary:hover{background:var(--gold2);}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .btn-ghost:hover{color:var(--text);border-color:var(--border2);background:var(--card);}
  .btn-blue{background:rgba(74,143,255,0.15);color:var(--blue);border:1px solid rgba(74,143,255,0.3);}
  .btn-blue:hover{background:rgba(74,143,255,0.25);}
  .btn-green{background:rgba(78,203,141,0.15);color:var(--green);border:1px solid rgba(78,203,141,0.3);}
  .btn-green:hover{background:rgba(78,203,141,0.25);}
  .btn-sm{padding:5px 10px;font-size:12px;}
  .btn-xs{padding:3px 8px;font-size:11px;}
  .btn-danger{background:rgba(224,92,74,0.1);color:var(--coral);border:1px solid rgba(224,92,74,0.3);}
  .btn-danger:hover{background:rgba(224,92,74,0.2);}

  /* ── Cards / panels ── */
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rad-lg);padding:18px;}
  .stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:8px;}
  .stat-value{font-size:26px;font-weight:600;color:var(--text);font-family:'DM Serif Display',serif;}
  .stat-sub{font-size:12px;color:var(--muted);margin-top:4px;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:var(--rad-lg);padding:18px;margin-bottom:14px;}
  .panel-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px;}

  /* ── Table ── */
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;}
  th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
  td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}

  /* ── Pills ── */
  .pill{display:inline-block;border-radius:20px;font-size:11px;font-weight:600;padding:3px 9px;}
  .pill-teal{background:rgba(62,207,179,0.12);color:var(--teal2);}
  .pill-gold{background:rgba(201,168,76,0.12);color:var(--gold2);}
  .pill-blue{background:rgba(74,143,255,0.12);color:var(--blue);}
  .pill-purple{background:rgba(155,111,255,0.12);color:var(--purple);}
  .pill-coral{background:rgba(224,92,74,0.12);color:var(--coral);}
  .pill-green{background:rgba(78,203,141,0.12);color:var(--green);}
  .pill-gray{background:rgba(122,136,170,0.12);color:var(--muted);}
  .pill-amber{background:rgba(245,158,11,0.12);color:var(--amber);}
  .pill-red{background:rgba(224,92,74,0.18);color:#ff7b6b;}

  /* ── Pipeline ── */
  .pipeline{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;}
  .pipeline-col{min-width:220px;width:220px;flex-shrink:0;}
  .pipeline-header{background:var(--card2);border:1px solid var(--border);border-radius:var(--rad);padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
  .pipeline-colname{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;}
  .pipeline-count{font-size:11px;color:var(--muted);}
  .deal-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rad);padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s;}
  .deal-card:hover{border-color:var(--border2);}
  .deal-name{font-size:13px;font-weight:500;margin-bottom:4px;}
  .deal-val{font-size:12px;color:var(--gold2);font-weight:600;}
  .deal-meta{font-size:11px;color:var(--muted);margin-top:5px;}

  /* ── Tasks (Infusionsoft style) ── */
  .task-day-group{margin-bottom:20px;}
  .task-day-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .task-day-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;}
  .task-day-line{flex:1;height:1px;background:var(--border);}
  .task-day-count{font-size:11px;color:var(--muted);}
  .task-row{display:flex;align-items:flex-start;gap:12px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--rad);margin-bottom:6px;transition:border-color 0.15s;}
  .task-row:hover{border-color:var(--border2);}
  .task-row.overdue{border-left:3px solid var(--coral);}
  .task-row.due-today{border-left:3px solid var(--amber);}
  .task-row.done-row{opacity:0.42;}
  .task-check{margin-top:2px;width:16px;height:16px;cursor:pointer;accent-color:var(--gold);flex-shrink:0;}
  .task-body{flex:1;min-width:0;}
  .task-title{font-size:13px;font-weight:500;line-height:1.4;}
  .task-title.strikethrough{text-decoration:line-through;color:var(--muted);}
  .task-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;align-items:center;}
  .task-meta-text{font-size:11px;color:var(--muted);}
  .task-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}

  /* ── Email composer ── */
  .email-toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--rad);}
  .email-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
  .email-stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
  .email-stat-val{font-size:20px;font-weight:600;font-family:'DM Serif Display',serif;}
  .email-stat-label{font-size:11px;color:var(--muted);margin-top:2px;}
  .recipient-list{background:var(--card);border:1px solid var(--border);border-radius:var(--rad);max-height:260px;overflow-y:auto;}
  .recipient-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);}
  .recipient-row:last-child{border-bottom:none;}
  .recipient-row input[type=checkbox]{width:14px;height:14px;accent-color:var(--gold);cursor:pointer;}
  .select-all-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--card2);border-bottom:1px solid var(--border);border-radius:var(--rad) var(--rad) 0 0;}

  /* ── Form ── */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-full{grid-column:1/-1;}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  label{font-size:12px;font-weight:500;color:var(--muted);}
  input,select,textarea{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 11px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;width:100%;}
  input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,168,76,0.15);}
  select option{background:var(--card);}
  textarea{resize:vertical;min-height:80px;}

  /* ── Modal ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(3px);}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad-lg);padding:24px;width:600px;max-width:96vw;max-height:92vh;overflow-y:auto;}
  .modal-lg{width:760px;}
  .modal-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:18px;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

  /* ── Detail ── */
  .detail-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;}
  .detail-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-family:'DM Serif Display',serif;font-weight:bold;flex-shrink:0;color:#fff;}
  .detail-name{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:4px;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .detail-field{background:var(--card);border-radius:8px;padding:10px 12px;}
  .detail-flabel{font-size:11px;color:var(--muted);margin-bottom:3px;}
  .detail-fval{font-size:13px;}

  /* ── Misc ── */
  .empty{text-align:center;padding:48px 24px;color:var(--muted);}
  .empty-text{font-size:14px;}
  .search-row{display:flex;gap:10px;margin-bottom:18px;align-items:center;flex-wrap:wrap;}
  .search-wrap{position:relative;flex:1;min-width:180px;}
  .search-wrap input{padding-left:32px;}
  .s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:13px;}
  .note-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;}
  .note-meta{font-size:11px;color:var(--muted);margin-top:5px;}
  .activity-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
  .activity-item:last-child{border-bottom:none;}
  .activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
  .tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--card);border-radius:10px;padding:4px;border:1px solid var(--border);}
  .tab{padding:7px 14px;border-radius:7px;font-size:13px;cursor:pointer;color:var(--muted);transition:all 0.15s;font-weight:500;}
  .tab.active{background:var(--gold);color:#0d0f14;font-weight:600;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
  .divider{height:1px;background:var(--border);margin:14px 0;}
  .chip{display:inline-flex;align-items:center;gap:4px;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--muted);}
</style>
</head>

// PERSISTENCE (localStorage)
// ══════════════════════════════════════════════════════════════════════════
const STORAGE_KEY = 'meridian_crm_v2';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    const ind = document.getElementById('save-indicator');
    if (ind) { ind.textContent = '● Saved'; ind.style.color = 'var(--green)'; ind.style.opacity = '1'; setTimeout(()=>ind.style.opacity='0.4', 2000); }
  } catch(e) {}
}

function resetData() {
  if (!confirm('Reset ALL data to demo defaults? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  updateTaskBadge(); nav(state.currentPage || 'dashboard');
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'meridian-crm-backup-' + today() + '.json'; a.click();
}

function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.contacts || !data.deals) return alert('Invalid backup file');
      state = data; saveState(); updateTaskBadge(); nav('dashboard');
    } catch(err) { alert('Could not read file: ' + err.message); }
  };
  reader.readAsText(file);
}

// ══════════════════════════════════════════════════════════════════════════
const BIZ_COLORS = {Brokerage:'teal',Syndication:'gold',RIA:'purple'};
const STAGE_COLORS = {
  'Lead':'gray','Prospect':'blue','Active Listing':'teal','Showing':'blue',
  'LOI Submitted':'gold','Under Contract':'gold','Due Diligence':'purple','Closed':'green',
  'Sourcing':'gray','Underwriting':'blue','Fundraising':'blue','Closing':'gold','Closed Fund':'green',
  'New Client':'teal','In Progress':'blue','Annual Review':'gold','Completed':'green'
};
const BROK_STAGES = ['Active Listing','Showing','LOI Submitted','Under Contract','Due Diligence','Closed'];
const SYN_STAGES  = ['Sourcing','Underwriting','Fundraising','Closing','Closed Fund'];
const RIA_STAGES  = ['New Client','In Progress','Annual Review','Completed'];

const bizPill   = b => `<span class="pill pill-${BIZ_COLORS[b]||'gray'}">${b||'—'}</span>`;
const stagePill = s => `<span class="pill pill-${STAGE_COLORS[s]||'gray'}">${s}</span>`;
const fmt$ = n => n>=1000000 ? '$'+(n/1000000).toFixed(1)+'M' : n>=1000 ? '$'+Math.round(n/1000)+'K' : '$'+n;
const initials = n => n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const AV_COLS = ['#3ecfb3','#4a8fff','#9b6fff','#c9a84c','#e05c4a','#4ecb8d','#f0c96e','#e07aff'];
const avColor = n => AV_COLS[(n||'A').charCodeAt(0) % AV_COLS.length];
const today = () => new Date().toISOString().slice(0,10);
const getStages = line => line==='brokerage' ? BROK_STAGES : line==='syndication' ? SYN_STAGES : RIA_STAGES;
const esc = s => (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function dayLabel(dateStr) {
  if (!dateStr || dateStr === '—') return 'No Due Date';
  const d = new Date(dateStr + 'T00:00:00');
  const t = new Date(); t.setHours(0,0,0,0);
  const diff = Math.round((d - t) / 86400000);
  if (diff < 0) return `Overdue (${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})})`;
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff <= 7) return d.toLocaleDateString('en-US',{weekday:'long'});
  return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}

function taskStatus(dueStr, done) {
  if (done) return 'done';
  if (!dueStr || dueStr === '—') return 'open';
  const d = new Date(dueStr + 'T00:00:00');
  const t = new Date(); t.setHours(0,0,0,0);
  const diff = Math.round((d - t) / 86400000);
  if (diff < 0) return 'overdue';
  if (diff === 0) return 'today';
  return 'open';
}

function setActive(page) {
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const map = {dashboard:0,contacts:1,companies:2,brokerage:3,syndication:4,ria:5,tasks:6,email:7};

}

// ══════════════════════════════════════════════════════════════════════════
// TASKS  —  Infusionsoft-style chronological view
// ══════════════════════════════════════════════════════════════════════════
function renderTasks(viewFilter='open') {
  const todayStr = today();
  let list = [...state.tasks];

  // Sort: overdue first, then by date, then no-date at end
  list.sort((a,b) => {
    const da = a.due||'9999', db = b.due||'9999';
    return da.localeCompare(db);
  });

  const open = list.filter(t=>!t.done);
  const done = list.filter(t=>t.done);
  const overdueCount = open.filter(t=>taskStatus(t.due,false)==='overdue').length;

  // Group open tasks by day label
  const groups = {};
  open.forEach(t => {
    const key = t.due||'9999'; // sort key
    const label = dayLabel(t.due);
    if (!groups[label]) groups[label] = {label, tasks:[], key};
    groups[label].tasks.push(t);
  });
  const sortedGroups = Object.values(groups).sort((a,b)=>a.key.localeCompare(b.key));

  document.getElementById('content').innerHTML = `
  <div style="display:flex;gap:10px;margin-bottom:20px;align-items:center;flex-wrap:wrap">
    <div class="tabs" style="margin-bottom:0">
      <div class="tab ${viewFilter==='open'?'active':''}" onclick="renderTasks('open')">Open (${open.length})</div>
      <div class="tab ${viewFilter==='completed'?'active':''}" onclick="renderTasks('completed')">Completed (${done.length})</div>
      <div class="tab ${viewFilter==='all'?'active':''}" onclick="renderTasks('all')">All (${list.length})</div>
    </div>
    ${overdueCount?`<span class="pill pill-coral">⚠ ${overdueCount} overdue</span>`:''}
  </div>

  ${viewFilter==='open'||viewFilter==='all' ? (
    sortedGroups.length ? sortedGroups.map(g => {
      const isOverdueGroup = g.label.startsWith('Overdue');
      const isTodayGroup   = g.label === 'Today';
      return `<div class="task-day-group">
        <div class="task-day-header">
          <span class="task-day-label" style="color:${isOverdueGroup?'var(--coral)':isTodayGroup?'var(--amber)':'var(--muted)'}">${g.label}</span>
          <div class="task-day-line"></div>
          <span class="task-day-count">${g.tasks.length} task${g.tasks.length!==1?'s':''}</span>
        </div>
        ${g.tasks.map(t => taskRowHTML(t)).join('')}
      </div>`;
    }).join('') : '<div class="panel"><div class="empty"><div class="empty-text">🎉 All tasks complete! Nothing open.</div></div></div>'
  ) : ''}

  ${viewFilter==='completed'||viewFilter==='all' ? (
    done.length ? `
    <div class="task-day-group">
      <div class="task-day-header">
        <span class="task-day-label" style="color:var(--green)">Completed</span>
        <div class="task-day-line"></div>
        <span class="task-day-count">${done.length}</span>
      </div>
      ${done.map(t=>taskRowHTML(t)).join('')}
    </div>` : '<div class="panel"><div class="empty"><div class="empty-text">No completed tasks yet</div></div></div>'
  ) : ''}`;
}

function taskRowHTML(t) {
  const st = taskStatus(t.due, t.done);
  const rowClass = t.done ? 'done-row' : st==='overdue' ? 'overdue' : st==='today' ? 'due-today' : '';
  const priorityPill = t.priority==='High'?'<span class="pill pill-coral">High</span>':t.priority==='Medium'?'<span class="pill pill-amber">Medium</span>':'<span class="pill pill-gray">Low</span>';
  return `<div class="task-row ${rowClass}">
    <input class="task-check" type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})">
    <div class="task-body">
      <div class="task-title ${t.done?'strikethrough':''}">${esc(t.title)}</div>
      <div class="task-meta">
        ${bizPill(t.bizLine)}
        ${priorityPill}
        ${t.contact?`<span class="chip">👤 ${esc(t.contact)}</span>`:''}
        ${t.notes?`<span style="font-size:11px;color:var(--muted);font-style:italic">${esc(t.notes.slice(0,60))}${t.notes.length>60?'…':''}</span>`:''}
      </div>
    </div>
    <div class="task-actions">
      <button class="btn btn-ghost btn-xs" onclick="openEditTask(${t.id})">Edit</button>
      <button class="btn btn-danger btn-xs" onclick="deleteTask(${t.id})">Del</button>
    </div>
  </div>`;
}

function toggleTask(id) {
  const t = state.tasks.find(x=>x.id===id);
  if (t) { t.done=!t.done; saveState(); updateTaskBadge(); renderTasks(document.querySelector('.tab.active')?.textContent.toLowerCase().split(' ')[0]||'open'); }

        <tr>
          <td style="font-weight:500">${esc(c.subject)}</td>
          <td>${bizPill(c.bizLine)}</td>
          <td><span class="pill ${c.status==='Sent'?'pill-green':c.status==='Draft'?'pill-gold':'pill-gray'}">${c.status}</span></td>
          <td>${c.recipients}</td>
          <td style="color:var(--muted)">${c.sentAt}</td>
          <td>
            <button class="btn btn-ghost btn-xs" onclick="previewCampaign(${c.id})">Preview</button>
            <button class="btn btn-danger btn-xs" onclick="deleteCampaign(${c.id})">Del</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table></div>` : '<div class="empty"><div class="empty-text">No campaigns yet. Compose your first!</div></div>'}
  </div>`;
}

function openComposeEmail() {
  const bizLines = ['All','Brokerage','Syndication','RIA'];
  const contactTypes = ['All Types','Investor','Buyer','Seller','Tenant','Landlord','Client','LP','Broker'];
  document.getElementById('modal-body').className = 'modal modal-lg';
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-title">✉ Compose Mass Email Campaign</div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <div style="margin-bottom:14px">
          <div class="panel-title" style="margin-bottom:10px">Campaign Details</div>
          <div class="form-grid">
            <div class="form-group form-full"><label>Subject Line *</label>
              <input id="em-subject" type="text" placeholder="Q2 2024 Market Update – Meridian CRM"></div>
            <div class="form-group form-full"><label>Email Body</label>
              <textarea id="em-body" style="min-height:160px" placeholder="Dear {first_name},&#10;&#10;We wanted to share...&#10;&#10;Use {first_name}, {last_name}, {email}, {company} as merge tags."></textarea></div>
            <div class="form-group"><label>Sender Name</label><input id="em-from-name" placeholder="Your Name / Firm"></div>
            <div class="form-group"><label>Reply-To Email</label><input id="em-reply" type="email" placeholder="you@meridian.com"></div>
          </div>
        </div>

        <div>
          <div class="panel-title" style="margin-bottom:8px">Filter Recipients</div>
          <div style="display:flex;gap:8px;margin-bottom:10px">
            <select id="em-biz" onchange="refreshRecipients()" style="flex:1">
              ${bizLines.map(b=>`<option>${b}</option>`).join('')}
            </select>
            <select id="em-type" onchange="refreshRecipients()" style="flex:1">
              ${contactTypes.map(t=>`<option>${t}</option>`).join('')}
            </select>
          </div>
        </div>
      </div>

      <div>
        <div class="panel-title" style="margin-bottom:8px">Recipients <span id="rec-count" style="font-weight:600;color:var(--text)"></span></div>
        <div class="select-all-row">
          <input type="checkbox" id="select-all" checked onchange="toggleAllRecipients(this.checked)" style="width:14px;height:14px;accent-color:var(--gold);cursor:pointer">
          <span style="font-size:12px;color:var(--muted)">Select / Deselect All</span>
          <span id="sel-count" style="margin-left:auto;font-size:11px;color:var(--muted)"></span>
        </div>
        <div class="recipient-list" id="recipient-list"></div>
      </div>
    </div>

    <div class="divider"></div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--rad);padding:12px;margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px">Export & Send Options</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-green btn-sm" onclick="exportEmailCSV()">↓ Export CSV (for Mailchimp / Constant Contact)</button>
        <button class="btn btn-blue btn-sm" onclick="copyEmailList()">⎘ Copy Email Addresses</button>
        <button class="btn btn-ghost btn-sm" onclick="saveDraftCampaign()">Save as Draft</button>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px">CSV includes: First Name, Last Name, Email, Company, Type, Business Line, AUM — ready for any email platform's import.</div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="logCampaignSent()">✓ Log as Sent</button>
    </div>`;
  showModal();
  refreshRecipients();
}

function getSelectedContacts() {
  const bizFilter = document.getElementById('em-biz')?.value;
  const typeFilter = document.getElementById('em-type')?.value;
  let list = state.contacts;
  if (bizFilter && bizFilter !== 'All') list = list.filter(c=>c.bizLine===bizFilter);
  if (typeFilter && typeFilter !== 'All Types') list = list.filter(c=>c.type===typeFilter);
  return list;
}

function getCheckedContacts() {
  const checkboxes = document.querySelectorAll('.rec-check:checked');
  const ids = [...checkboxes].map(cb=>parseInt(cb.dataset.id));
  return state.contacts.filter(c=>ids.includes(c.id));
}

function refreshRecipients() {
  const list = getSelectedContacts();
  const rl = document.getElementById('recipient-list');
  if (!rl) return;
  rl.innerHTML = list.length ? list.map(c=>`
    <div class="recipient-row">
      <input type="checkbox" class="rec-check" data-id="${c.id}" checked onchange="updateSelCount()">
      <div style="width:26px;height:26px;border-radius:50%;background:${avColor(c.name)};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0">${initials(c.name)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500">${esc(c.name)}</div>
        <div style="font-size:11px;color:var(--muted)">${esc(c.email||'no email')}</div>
      </div>
      <div style="font-size:11px">${bizPill(c.bizLine)}</div>
    </div>`).join('') : '<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">No contacts match this filter</div>';
  document.getElementById('rec-count').textContent = `(${list.length})`;
  updateSelCount();
}

function updateSelCount() {
  const total = document.querySelectorAll('.rec-check').length;
  const checked = document.querySelectorAll('.rec-check:checked').length;
  const el = document.getElementById('sel-count');
  if (el) el.textContent = `${checked} of ${total} selected`;
}

function toggleAllRecipients(checked) {
  document.querySelectorAll('.rec-check').forEach(cb=>cb.checked=checked);
  updateSelCount();
}

function exportEmailCSV() {
  const contacts = getCheckedContacts();
  if (!contacts.length) return alert('No recipients selected');
  const rows = [['First Name','Last Name','Email Address','Company','Type','Business Line','AUM','Tags']];
  contacts.forEach(c => {
    const parts = c.name.trim().split(' ');
    const first = parts[0]||''; const last = parts.slice(1).join(' ')||'';
    rows.push([first, last, c.email||'', c.company||'', c.type, c.bizLine, c.aum||'', (c.tags||[]).join('; ')]);
  });
  const csv = rows.map(r=>r.map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'meridian-email-list-' + today() + '.csv'; a.click();
}

function copyEmailList() {
  const contacts = getCheckedContacts();
  if (!contacts.length) return alert('No recipients selected');
  const emails = contacts.filter(c=>c.email).map(c=>c.email).join(', ');
  navigator.clipboard.writeText(emails).then(()=>alert(`Copied ${contacts.filter(c=>c.email).length} email addresses to clipboard!`));
}

function saveDraftCampaign() {
  const subject = document.getElementById('em-subject')?.value.trim();
  if (!subject) return alert('Subject is required');
  const contacts = getCheckedContacts();
  const biz = document.getElementById('em-biz')?.value||'All';
  if (!state.emailCampaigns) state.emailCampaigns = [];
  state.emailCampaigns.push({
    id:++state.nextId, subject,
    body: document.getElementById('em-body')?.value||'',
    fromName: document.getElementById('em-from-name')?.value||'',
    replyTo: document.getElementById('em-reply')?.value||'',
    bizLine: biz, recipients: contacts.length,
    sentAt: today(), status:'Draft'
  });
  saveState(); closeModal(); renderEmail();
}

function logCampaignSent() {
  const subject = document.getElementById('em-subject')?.value.trim();
  if (!subject) return alert('Subject is required');
  const contacts = getCheckedContacts();
  if (!contacts.length) return alert('No recipients selected');
  const biz = document.getElementById('em-biz')?.value||'All';
  if (!state.emailCampaigns) state.emailCampaigns = [];
  state.emailCampaigns.push({
    id:++state.nextId, subject,
    body: document.getElementById('em-body')?.value||'',
    fromName: document.getElementById('em-from-name')?.value||'',
    replyTo: document.getElementById('em-reply')?.value||'',
    bizLine: biz, recipients: contacts.length,
    sentAt: today(), status:'Sent'
  });
  saveState(); closeModal(); renderEmail();
  alert(`Campaign logged! ${contacts.length} recipients. Don't forget to paste your CSV into your email platform.`);
}

function previewCampaign(id) {
  const c = (state.emailCampaigns||[]).find(x=>x.id===id); if (!c) return;
  document.getElementById('modal-body').className = 'modal';
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-title">Preview: ${esc(c.subject)}</div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      ${bizPill(c.bizLine)}<span class="pill ${c.status==='Sent'?'pill-green':'pill-gold'}">${c.status}</span>
      <span style="font-size:12px;color:var(--muted)">${c.recipients} recipients · ${c.sentAt}</span>
    </div>
    ${c.fromName?`<div style="font-size:12px;color:var(--muted);margin-bottom:4px">From: ${esc(c.fromName)}${c.replyTo?' &lt;'+esc(c.replyTo)+'&gt;':''}</div>`:''}
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--rad);padding:16px;white-space:pre-wrap;font-size:13px;line-height:1.7;margin-bottom:14px">${esc(c.body||'(No body)')}</div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div>`;
  showModal();
}

function deleteCampaign(id) {
  if (!confirm('Delete this campaign?')) return;
  state.emailCampaigns = (state.emailCampaigns||[]).filter(c=>c.id!==id);
  saveState(); renderEmail();
}

function exportContactsCSV() {
  const rows = [['First Name','Last Name','Email Address','Company','Type','Business Line','AUM','Tags','Phone','Lead Source']];
  state.contacts.forEach(c => {
    const parts = c.name.trim().split(' ');
    rows.push([parts[0]||'', parts.slice(1).join(' ')||'', c.email||'', c.company||'', c.type, c.bizLine, c.aum||'', (c.tags||[]).join('; '), c.phone||'', c.source||'']);
  });
  const csv = rows.map(r=>r.map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'meridian-all-contacts-' + today() + '.csv'; a.click();
}

  document.getElementById('modal-body').className = 'modal';
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }

document.getElementById('save-indicator').style.opacity = '0.4';
nav('dashboard');
</script>
